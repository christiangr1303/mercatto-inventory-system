<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="description" content="" />
	<meta name="author" content="" />
	<title>Sistema de inventario</title>
	<link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
	<link th:href="@{/css/styles.css}" rel="stylesheet" />
	<script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body>
	<nav th:replace="~{/plantillas/fragments :: navbar}"></nav>
	<div id="layoutSidenav">
		<div th:replace="~{/plantillas/fragments :: menuLateral}"></div>
		<div id="layoutSidenav_content">
			<!-- Aqui ira tu contenido -->
			<div class="container mt-4">

				<div class="d-flex justify-content-between align-items-center mb-3">
					<h2 class="fw-bold">Proveedores</h2>
					<a th:href="@{/proveedores/nuevo}" class="btn btn-primary">
						+ Nuevo
					</a>
				</div>

				<div class="card shadow-sm">
					<div class="card-body">

						<div class="table-responsive">
							<table class="table table-bordered table-hover align-middle">

								<thead class="table-light text-center">
									<tr>
										<th>ID</th>
										<th>Nombre</th>
										<th>Email</th>
										<th>Teléfono</th>
										<th>Acciones</th>
									</tr>
								</thead>

								<tbody>
									<tr th:each="p : ${proveedores}">
										<td th:text="${p.id}" class="text-center"></td>
										<td th:text="${p.nombre}"></td>
										<td th:text="${p.email}"></td>
										<td th:text="${p.telefono}"></td>

										<td class="text-center">
											<a th:href="@{'/proveedores/editar/' + ${p.id}}"
												class="btn btn-sm btn-outline-primary">
												<i class="fa-solid fa-pen-to-square"></i>
											</a>

											<a th:href="@{'/proveedores/eliminar/' + ${p.id}}"
												class="btn btn-sm btn-outline-danger">
												<i class="fa-solid fa-trash-can"></i>
											</a>
										</td>
									</tr>
								</tbody>

							</table>
							<nav>
								<ul class="pagination">
									<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
										<a class="page-link" th:href="@{/proveedores(page=${currentPage - 1})}">
											Anterior
										</a>
									</li>
									<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages -1)}"
										th:classappend="${i == currentPage} ? 'active'">
										<a class="page-link" th:href="@{/proveedores(page=${i})}" th:text="${i + 1}">
										</a>
									</li>
									<li class="page-item"
										th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
										<a class="page-link" th:href="@{/proveedores(page=${currentPage + 1})}">
											Siguiente
										</a>
									</li>
								</ul>
							</nav>
						</div>

					</div>
				</div>

			</div>
			<footer th:replace="~{plantillas/fragments :: footer}"></footer>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/scripts.js}"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
	<script src="assets/demo/chart-area-demo.js"></script>
	<script src="assets/demo/chart-bar-demo.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
		crossorigin="anonymous"></script>
	<script src="js/datatables-simple-demo.js"></script>
</body>
