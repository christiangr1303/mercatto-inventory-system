<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="description" content="" />
	<meta name="author" content="" />
	<title>Sistema de inventario</title>
	<link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
	<link th:href="@{/css/styles.css}" rel="stylesheet" />
	<script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body>
	<nav th:replace="~{/plantillas/fragments :: navbar}"></nav>
	<div id="layoutSidenav">
		<div th:replace="~{/plantillas/fragments :: menuLateral}"></div>
		<div id="layoutSidenav_content">
			<!-- Aqui ira tu contenido -->
			<div class="container mt-4">
				<div class="card shadow-sm">
					<div class="card-body">
						<h3 class="mb-4">Nuevo Proveedor</h3>
						<form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post">
							<div class="mb-3">
								<label class="form-label">Nombre</label>
								<input type="text" th:field="*{nombre}" class="form-control" required>
							</div>
							<div class="mb-3">
								<label class="form-label">Email</label>
								<input type="email" th:field="*{email}" class="form-control">
							</div>
							<div class="mb-3">
								<label class="form-label">Teléfono</label>
								<input type="text" th:field="*{telefono}" class="form-control">
							</div>
							<div class="mb-3">
								<label class="form-label">Dirección</label>
								<input type="text" th:field="*{direccion}" class="form-control">
							</div>
							<button type="submit" class="btn btn-primary">Guardar</button>
							<a th:href="@{/proveedores}" class="btn btn-secondary">Cancelar</a>
						</form>
					</div>
				</div>
			</div>
			<footer th:replace="~{plantillas/fragments :: footer}"></footer>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/scripts.js}"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
	<script src="assets/demo/chart-area-demo.js"></script>
	<script src="assets/demo/chart-bar-demo.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
		crossorigin="anonymous"></script>
	<script src="js/datatables-simple-demo.js"></script>
</body>
