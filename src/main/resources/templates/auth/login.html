<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Login</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 400px;">

			<h3 class="text-center mb-4">Iniciar sesión</h3>

			<!-- Mensaje de error -->
			<div th:if="${param.error}" class="alert alert-danger">
				Usuario o contraseña incorrectos
			</div>

			<!-- Logout exitoso -->
			<div th:if="${param.logout}" class="alert alert-success">
				Sesión cerrada correctamente
			</div>

			<form th:action="@{/auth/login}" method="post">

				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="text" name="username" class="form-control" placeholder="Ingresa tu email" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Contraseña</label>
					<input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña"
						required>
				</div>

				<button type="submit" class="btn btn-primary w-100">
					Ingresar
				</button>
			</form>
			<div class="text-center mt-3">
				<p class="mb-1">¿No tienes cuenta?</p> <a th:href="@{/auth/register}"
					class="btn btn-outline-primary btn-sm"> Registrarse </a>
			</div>

		</div>
	</div>

</body>

</html>
