<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Registro</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 450px;">

			<h3 class="text-center mb-4">Crear cuenta</h3>

			<!-- Mensaje de error -->
			<div th:if="${error}" class="alert alert-danger">
				[[${error}]]
			</div>

			<!-- Mensaje de éxito -->
			<div th:if="${success}" class="alert alert-success">
				[[${success}]]
			</div>

			<form th:action="@{/auth/register}" method="post" th:object="${usuario}">
				<!--
				<div class="mb-3">
					<label class="form-label">Nombre</label>
					<input type="text" th:field="*{name}" class="form-control" placeholder="Tu nombre completo"
						required>
				</div>
				-->
				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="email" th:field="*{email}" class="form-control" placeholder="ejemplo@email.com"
						required>
					<div class="text-danger" th:if="${#fields.hasErrors('email')" th:errors="*{email}"></div>
				</div>

				<div class="mb-3">
					<label class="form-label">Contraseña</label>
					<input type="password" th:field="*{password}" class="form-control" placeholder="Crea una contraseña"
						required>
					<div class="text-danger" th:if="${#fields.hasErrors('password')" th:errors="*{password}"></div>
				</div>

				<div class="mb-3">
					<label class="form-label">Confirmar contraseña</label>
					<input type="password" th:field="*{confirmPassword}" class="form-control"
						placeholder="Repite la contraseña" required>
					<div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')" th:errors="*{confirmPassword}"></div>
				</div>

				<button type="submit" class="btn btn-success w-100">
					Registrarse
				</button>
			</form>

			<div class="text-center mt-3">
				<p class="mb-1">¿Ya tienes cuenta?</p>
				<a th:href="@{/auth/login}" class="btn btn-outline-primary btn-sm">
					Iniciar sesión
				</a>
			</div>

		</div>
	</div>

</body>

</html>
