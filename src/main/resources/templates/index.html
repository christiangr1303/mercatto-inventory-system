<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="description" content="" />
	<meta name="author" content="" />
	<title>Sistema de inventario</title>
	<link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
	<link th:href="@{/css/styles.css}" rel="stylesheet" />
	<script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

	<nav th:replace="~{/plantillas/fragments :: navbar}"></nav>
	<div id="layoutSidenav">
		<div th:replace="~{/plantillas/fragments :: menuLateral}"></div>
		<div id="layoutSidenav_content">

			<div class="container-fluid px-4">
				<h1 class="mt-4">Dashboard</h1>
				<ol class="breadcrumb mb-4">
					<li class="breadcrumb-item active">Dashboard</li>
				</ol>

				<div class="row">
					<div class="col-xl-3 col-md-6">
						<div class="card bg-primary text-white mb-4">
							<div class="card-body">
								<small class="text-uppercase fw-light">Total Productos</small>
								<h2 class="display-5 fw-bold">1,250</h2>
							</div>
							<div class="card-footer d-flex align-items-center justify-content-between">
								<a class="small text-white stretched-link" href="#">Ver detalles</a>
								<div class="small text-white"><i class="fas fa-boxes"></i></div>
							</div>
						</div>
					</div>

					<div class="col-xl-3 col-md-6">
						<div class="card bg-success text-white mb-4">
							<div class="card-body">
								<small class="text-uppercase fw-light">Valor Total</small>
								<h2 class="display-5 fw-bold">$45.2k</h2>
							</div>
							<div class="card-footer d-flex align-items-center justify-content-between">
								<a class="small text-white stretched-link" href="#">Ver reporte</a>
								<div class="small text-white"><i class="fas fa-dollar-sign"></i></div>
							</div>
						</div>
					</div>

					<div class="col-xl-3 col-md-6">
						<div class="card bg-warning text-dark mb-4">
							<div class="card-body">
								<small class="text-uppercase fw-bold">Bajo Stock</small>
								<h2 class="display-5 fw-bold">12</h2>
							</div>
							<div
								class="card-footer d-flex align-items-center justify-content-between border-top border-dark border-opacity-10">
								<a class="small text-dark stretched-link" href="#">Revisar alertas</a>
								<div class="small text-dark"><i class="fas fa-exclamation-triangle"></i></div>
							</div>
						</div>
					</div>

					<div class="col-xl-3 col-md-6">
						<div class="card bg-danger text-white mb-4">
							<div class="card-body">
								<small class="text-uppercase fw-light">Sin Stock</small>
								<h2 class="display-5 fw-bold">4</h2>
							</div>
							<div class="card-footer d-flex align-items-center justify-content-between">
								<a class="small text-white stretched-link" href="#">Reponer ahora</a>
								<div class="small text-white"><i class="fas fa-times-circle"></i></div>
							</div>
						</div>
					</div>
				</div>

				<div class="row">
					<div class="col-xl-6">
						<div class="card mb-4">
							<div class="card-header">
								<i class="fas fa-chart-area me-1"></i>
								Area Chart Example
							</div>
							<div class="card-body"><canvas id="myAreaChart" width="100%" height="40"></canvas></div>
						</div>
					</div>
					<div class="col-xl-6">
						<div class="card mb-4">
							<div class="card-header">
								<i class="fas fa-chart-bar me-1"></i>
								Bar Chart Example
							</div>
							<div class="card-body"><canvas id="myBarChart" width="100%" height="40"></canvas></div>
						</div>
					</div>
				</div>


			</div>
			<footer th:replace="~{plantillas/fragments :: footer}"></footer>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/scripts.js}"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>

	<script th:inline="javascript">
		var misDatosDeInventario = [[${datosGrafico}]];
		var misEtiquetasDeInventario = [[${etiquetasGrafico}]];

		var etiquetasCategorias = [[${labelsCategorias}]];
		var valoresCategorias = [[${datosCategorias}]];
	</script>
	<script th:src="@{assets/demo/chart-area-demo.js}"></script>
	<script th:src="@{assets/demo/chart-bar-demo.js}"></script>


	<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
		crossorigin="anonymous"></script>
	<script src="js/datatables-simple-demo.js"></script>
</body>

</html>
