<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow">

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">Productos</h1>
        <a th:href="@{/productos/nuevo}" 
           class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
           + Nuevo
        </a>
    </div>

    <table class="w-full border-collapse">
        <thead>
            <tr class="bg-gray-200">
                <th class="p-2">ID</th>
                <th class="p-2">Nombre</th>
                <th class="p-2">Precio</th>
                <th class="p-2">Stock</th>
                <th class="p-2">Categoría</th>
                <th class="p-2">Proveedor</th>
                <th class="p-2">Estado</th>
                <th class="p-2">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}" class="border-t text-center">
                <td class="p-2" th:text="${p.id}"></td>
                <td class="p-2" th:text="${p.nombre}"></td>
                <td class="p-2" th:text="${p.precio}"></td>
                <td class="p-2" th:text="${p.stock}"></td>
                <td class="p-2" th:text="${p.categoriaNombre}"></td>
                <td class="p-2" th:text="${p.proveedorNombre}"></td>
                <td class="p-2">
                    <span th:text="${p.estado ? 'Activo' : 'Inactivo'}"
                          class="px-2 py-1 rounded text-white"
                          th:classappend="${p.estado} ? 'bg-green-500' : 'bg-red-500'">
                    </span>
                </td>
                <td class="p-2 space-x-2">
                    <a th:href="@{'/productos/editar/' + ${p.id}}"
                       class="text-blue-500 hover:underline">Editar</a>
                    <a th:href="@{'/productos/cambiarEstado/' + ${p.id}}"
                       class="text-red-500 hover:underline">Estado</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
