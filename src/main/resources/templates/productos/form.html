<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Nuevo Producto</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

	<div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

		<h1 class="text-xl font-bold mb-4">Registrar Producto</h1>

		<form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="space-y-4">

			<div>
				<label class="block">Nombre</label>
				<input type="text" th:field="*{nombre}" class="w-full border p-2 rounded" />
			</div>

			<div>
				<label class="block">Descripción</label>
				<input type="text" th:field="*{descripcion}" class="w-full border p-2 rounded" />
			</div>

			<div>
				<label class="block">Precio</label>
				<input type="number" step="0.01" th:field="*{precio}" class="w-full border p-2 rounded" />
			</div>

			<div>
				<label class="block">Stock</label>
				<input type="number" th:field="*{stock}" class="w-full border p-2 rounded" />
			</div>

			<div>
				<label class="block">Categoría</label>
				<select th:field="*{categoriaId}" class="w-full border p-2 rounded">
					<option value="">Seleccione</option>
					<option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}">
					</option>
				</select>
			</div>

			<div>
				<label class="block">Proveedor</label>
				<select th:field="*{proveedorId}" class="w-full border p-2 rounded">
					<option value="">Seleccione</option>
					<option th:each="p : ${proveedores}" th:value="${p.id}" th:text="${p.nombre}">
					</option>
				</select>
			</div>

			<div class="flex justify-between">
				<a th:href="@{/productos}" class="text-gray-500">Cancelar</a>

				<button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
					Guardar
				</button>
			</div>

		</form>

	</div>

</body>

</html>
